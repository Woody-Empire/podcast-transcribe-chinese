<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>播刻 — Podcast to Chinese</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ink: #1a1a1a;
  --paper: #ffffff;
  --paper-deep: #f4f4f4;
  --accent: #c73e1d;
  --accent-soft: rgba(199, 62, 29, 0.08);
  --stone: #666666;
  --stone-light: #999999;
  --border: #e0e0e0;
  --font-mono: 'IBM Plex Mono', 'Menlo', 'Consolas', monospace;
  --font-cn: 'Noto Sans SC', 'PingFang SC', sans-serif;
  --sidebar-w: 220px;
}

html { font-size: 16px; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-mono);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Top bar ── */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.8rem 1.5rem;
  border-bottom: 1px solid var(--border);
}

.top-bar-brand {
  font-family: var(--font-cn);
  font-weight: 400;
  font-size: 1rem;
  letter-spacing: 0.1em;
  color: var(--ink);
  text-decoration: none;
}

.top-bar-right {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.top-bar-user {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--stone);
}

.top-bar-user::before {
  content: '> ';
  color: var(--accent);
}

.top-bar-right a,
.top-bar-right button {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--stone);
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: color 0.15s;
}

.top-bar-right a:hover,
.top-bar-right button:hover { color: var(--accent); }

/* ── Page layout ── */
.page-layout {
  display: none;
  min-height: calc(100vh - 45px);
}

.page-layout.visible {
  display: flex;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  padding: 1rem 0;
  overflow-y: auto;
  height: calc(100vh - 45px);
  position: sticky;
  top: 45px;
}

.sidebar-title {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--stone);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0 1rem;
  margin-bottom: 0.5rem;
}

.sidebar-list {
  display: flex;
  flex-direction: column;
}

.sidebar-item {
  display: block;
  padding: 0.5rem 1rem;
  font-family: var(--font-cn);
  font-weight: 400;
  font-size: 0.82rem;
  color: var(--ink);
  text-decoration: none;
  transition: background 0.1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-left: 2px solid transparent;
}

.sidebar-item:hover {
  background: var(--paper-deep);
}

.sidebar-item.active {
  background: var(--accent-soft);
  border-left-color: var(--accent);
}

.sidebar-item-meta {
  display: block;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--stone-light);
  margin-top: 0.1rem;
}

.sidebar-empty {
  padding: 0.8rem 1rem;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--stone-light);
}

.sidebar-upload {
  display: block;
  margin: 0.5rem 0.8rem 0;
  padding: 0.45rem 0.6rem;
  border: 1px dashed var(--border);
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--stone);
  text-decoration: none;
  text-align: center;
  transition: all 0.15s;
  cursor: pointer;
  background: none;
  width: calc(100% - 1.6rem);
}

.sidebar-upload:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ── Main content ── */
.main-content {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Auth (centered, full page before login) ── */
.auth-page {
  display: none;
  min-height: 100vh;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.auth-page.visible {
  display: flex;
}

.auth-header {
  text-align: center;
  margin-bottom: 2.5rem;
}

.auth-header h1 {
  font-family: var(--font-cn);
  font-weight: 300;
  font-size: 2.4rem;
  letter-spacing: 0.15em;
  color: var(--ink);
}

.auth-header .subtitle {
  font-family: var(--font-mono);
  font-weight: 300;
  font-size: 0.8rem;
  color: var(--stone);
  margin-top: 0.6rem;
  letter-spacing: 0.08em;
}

.auth-card {
  width: 100%;
  max-width: 360px;
  padding: 0 1.5rem;
}

.auth-card-inner {
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2rem;
}

.auth-title {
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 0.9rem;
  margin-bottom: 1.4rem;
  color: var(--ink);
}

.auth-title::before {
  content: '$ ';
  color: var(--accent);
}

.auth-field {
  margin-bottom: 1rem;
}

.auth-field label {
  display: block;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--stone);
  letter-spacing: 0.04em;
  margin-bottom: 0.35rem;
}

.auth-field input {
  width: 100%;
  padding: 0.65rem 0.8rem;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--paper);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}

.auth-field input:focus {
  border-color: var(--ink);
}

.auth-submit {
  width: 100%;
  margin-top: 0.5rem;
  padding: 0.75rem;
  border: 1px solid var(--ink);
  border-radius: 3px;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 0.85rem;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: background 0.2s;
}

.auth-submit:hover { background: #333; }

.auth-toggle {
  text-align: center;
  margin-top: 1rem;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--stone);
}

.auth-toggle a {
  color: var(--accent);
  cursor: pointer;
  text-decoration: none;
}

.auth-toggle a:hover { text-decoration: underline; }

.auth-error {
  display: none;
  margin-top: 0.8rem;
  padding: 0.5rem 0.7rem;
  background: var(--accent-soft);
  border-left: 2px solid var(--accent);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--accent);
}

.auth-error.visible { display: block; }

/* ── Upload area ── */
.upload-area {
  width: 100%;
  max-width: 520px;
  padding: 3rem 1.5rem 2rem;
}

.upload-title {
  font-family: var(--font-cn);
  font-weight: 300;
  font-size: 1.3rem;
  letter-spacing: 0.1em;
  margin-bottom: 2rem;
  text-align: center;
}

.dropzone {
  border: 1px dashed var(--stone-light);
  border-radius: 4px;
  padding: 3rem 2rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}

.dropzone:hover {
  border-color: var(--ink);
  background: var(--paper-deep);
}

.dropzone.drag-over {
  border-color: var(--accent);
  background: var(--accent-soft);
}

.dropzone-icon {
  width: 36px;
  height: 36px;
  margin: 0 auto 1rem;
  opacity: 0.3;
}

.dropzone:hover .dropzone-icon { opacity: 0.5; }

.dropzone-icon svg {
  width: 100%;
  height: 100%;
  stroke: var(--ink);
  fill: none;
  stroke-width: 1.2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.dropzone-text {
  font-family: var(--font-cn);
  font-weight: 300;
  font-size: 0.95rem;
  color: var(--stone);
  line-height: 1.7;
}

.dropzone-text strong {
  font-weight: 500;
  color: var(--ink);
}

.dropzone-hint {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--stone-light);
  margin-top: 0.7rem;
}

input[type="file"] { display: none; }

.file-info {
  display: none;
  margin-top: 1.2rem;
  padding: 0.8rem 1rem;
  background: var(--paper-deep);
  border: 1px solid var(--border);
  border-radius: 3px;
  align-items: center;
  gap: 0.8rem;
}

.file-info.visible {
  display: flex;
  animation: fadeUp 0.3s ease forwards;
}

.file-icon {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  background: var(--ink);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.file-icon svg {
  width: 16px;
  height: 16px;
  stroke: var(--paper);
  fill: none;
  stroke-width: 1.5;
}

.file-details { flex: 1; min-width: 0; }

.file-name {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-size {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--stone);
  margin-top: 0.1rem;
}

.file-remove {
  flex-shrink: 0;
  width: 26px;
  height: 26px;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  transition: background 0.15s;
}

.file-remove:hover { background: var(--border); }

.file-remove svg {
  width: 14px;
  height: 14px;
  stroke: var(--stone);
  fill: none;
  stroke-width: 1.8;
}

.submit-btn {
  display: none;
  width: 100%;
  margin-top: 1rem;
  padding: 0.85rem;
  border: 1px solid var(--ink);
  border-radius: 3px;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 0.85rem;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: background 0.2s;
}

.submit-btn.visible { display: block; }
.submit-btn:hover { background: #333; }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.progress-section {
  display: none;
  margin-top: 1.2rem;
}

.progress-section.visible { display: block; }

.progress-label {
  display: flex;
  justify-content: space-between;
  margin-bottom: 0.6rem;
}

.progress-status {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--ink);
}

.progress-pct {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--stone);
}

.progress-track {
  width: 100%;
  height: 2px;
  background: var(--border);
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: width 0.3s;
}

.processing-section {
  display: none;
  margin-top: 1.5rem;
  text-align: center;
}

.processing-section.visible { display: block; }

.processing-wave {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  height: 36px;
  margin-bottom: 1rem;
}

.processing-wave span {
  display: block;
  width: 2px;
  height: 6px;
  background: var(--accent);
  animation: wave 1.2s ease-in-out infinite;
}

.processing-wave span:nth-child(1) { animation-delay: 0s; }
.processing-wave span:nth-child(2) { animation-delay: 0.1s; }
.processing-wave span:nth-child(3) { animation-delay: 0.2s; }
.processing-wave span:nth-child(4) { animation-delay: 0.3s; }
.processing-wave span:nth-child(5) { animation-delay: 0.4s; }
.processing-wave span:nth-child(6) { animation-delay: 0.5s; }
.processing-wave span:nth-child(7) { animation-delay: 0.6s; }
.processing-wave span:nth-child(8) { animation-delay: 0.7s; }
.processing-wave span:nth-child(9) { animation-delay: 0.8s; }

.processing-text {
  font-family: var(--font-mono);
  font-size: 0.82rem;
  color: var(--stone);
}

.processing-steps {
  margin-top: 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  text-align: left;
}

.step {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--stone-light);
  transition: color 0.2s;
}

.step.active { color: var(--ink); }
.step.done { color: var(--stone); }

.step-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--stone-light);
  flex-shrink: 0;
  transition: all 0.2s;
}

.step.active .step-dot {
  background: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
  animation: pulse 1.5s ease infinite;
}

.step.done .step-dot { background: var(--stone); }

.processing-logs {
  margin-top: 1rem;
  max-height: 140px;
  overflow-y: auto;
  text-align: left;
  padding: 0.6rem 0.8rem;
  background: var(--paper-deep);
  border: 1px solid var(--border);
  border-radius: 3px;
}

.log-entry {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--stone);
  padding: 0.2rem 0;
  opacity: 0;
  animation: fadeUp 0.2s ease forwards;
}

.log-entry::before {
  content: '> ';
  color: var(--stone-light);
}

.result-section {
  display: none;
  margin-top: 1.2rem;
}

.result-section.visible { display: block; }

.result-card {
  background: var(--paper-deep);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1.5rem;
  text-align: center;
}

.result-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--accent);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.8rem;
}

.result-badge::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
}

.result-title {
  font-family: var(--font-cn);
  font-weight: 400;
  font-size: 0.95rem;
  margin-bottom: 1.2rem;
  line-height: 1.5;
  color: var(--ink);
}

.result-actions {
  display: flex;
  gap: 0.6rem;
  margin-top: 1.2rem;
}

.btn-player, .btn-reset {
  flex: 1;
  padding: 0.65rem 0.8rem;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  border: none;
}

.btn-player {
  background: var(--ink);
  color: var(--paper);
}

.btn-player:hover { background: #333; }

.btn-reset {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--border);
}

.btn-reset:hover { background: var(--paper-deep); }

.btn-player svg, .btn-reset svg {
  width: 14px;
  height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
}

.error-msg {
  display: none;
  margin-top: 1rem;
  padding: 0.7rem 0.9rem;
  background: var(--accent-soft);
  border-left: 2px solid var(--accent);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--accent);
  line-height: 1.5;
}

.error-msg.visible {
  display: block;
  animation: shake 0.4s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes wave {
  0%, 100% { height: 6px; opacity: 0.3; }
  50% { height: 24px; opacity: 1; }
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px var(--accent-soft); }
  50% { box-shadow: 0 0 0 6px rgba(199, 62, 29, 0.04); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
}

@media (max-width: 700px) {
  .page-layout.visible { flex-direction: column; }
  .sidebar {
    width: 100%;
    height: auto;
    max-height: 180px;
    border-right: none;
    border-bottom: 1px solid var(--border);
    position: static;
  }
  .upload-area { padding: 2rem 1rem; }
  .dropzone { padding: 2rem 1.2rem; }
}
</style>
</head>
<body>

<!-- Auth page (shown when not logged in) -->
<div class="auth-page" id="authPage">
  <div class="auth-header">
    <h1>播刻</h1>
    <p class="subtitle">英文播客 — 中文声音</p>
  </div>
  <div class="auth-card">
    <div class="auth-card-inner">
      <div class="auth-title" id="authTitle">登录</div>
      <div class="auth-field">
        <label for="authUsername">用户名</label>
        <input type="text" id="authUsername" autocomplete="username">
      </div>
      <div class="auth-field">
        <label for="authPassword">密码</label>
        <input type="password" id="authPassword" autocomplete="current-password">
      </div>
      <button class="auth-submit" id="authSubmit">登录</button>
      <div class="auth-error" id="authError"></div>
      <div class="auth-toggle">
        <span id="authToggleText">还没有账号？</span>
        <a id="authToggleLink">注册</a>
      </div>
    </div>
  </div>
</div>

<!-- Main app (shown when logged in) -->
<nav class="top-bar" id="topBar" style="display:none">
  <a href="/" class="top-bar-brand">播刻</a>
  <div class="top-bar-right">
    <span class="top-bar-user" id="topBarUser"></span>
    <a href="/player">播放页</a>
    <button id="logoutBtn">退出</button>
  </div>
</nav>

<div class="page-layout" id="pageLayout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">播放列表</div>
    <div class="sidebar-list" id="sidebarList">
      <div class="sidebar-empty">暂无翻译记录</div>
    </div>
  </aside>

  <div class="main-content">
    <div class="upload-area">
      <div class="upload-title">上传播客</div>
      <div class="dropzone" id="dropzone">
        <div class="dropzone-icon">
          <svg viewBox="0 0 24 24"><path d="M12 16V4m0 0L8 8m4-4l4 4"/><path d="M20 16v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2"/></svg>
        </div>
        <p class="dropzone-text">
          <strong>拖放音频文件</strong>至此处<br>或点击选择文件
        </p>
        <p class="dropzone-hint">MP3 / WAV / M4A</p>
      </div>
      <input type="file" id="fileInput" accept="audio/*">

      <div class="file-info" id="fileInfo">
        <div class="file-icon">
          <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </div>
        <div class="file-details">
          <div class="file-name" id="fileName"></div>
          <div class="file-size" id="fileSize"></div>
        </div>
        <button class="file-remove" id="fileRemove" title="移除文件">
          <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <button class="submit-btn" id="submitBtn">开始转录</button>

      <div class="progress-section" id="progressSection">
        <div class="progress-label">
          <span class="progress-status" id="progressStatus">正在上传</span>
          <span class="progress-pct" id="progressPct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <div class="processing-section" id="processingSection">
        <div class="processing-wave">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
        <p class="processing-text" id="processingText">正在处理中，请稍候</p>
        <div class="processing-steps">
          <div class="step" id="step1"><span class="step-dot"></span>语音识别 ASR</div>
          <div class="step" id="step2"><span class="step-dot"></span>翻译为中文</div>
          <div class="step" id="step3"><span class="step-dot"></span>语音合成 TTS</div>
        </div>
        <div class="processing-logs" id="processingLogs"></div>
      </div>

      <div class="result-section" id="resultSection">
        <div class="result-card">
          <div class="result-badge">转录完成</div>
          <p class="result-title">您的中文播客音频已准备就绪</p>
          <div class="result-actions">
            <a class="btn-player" id="goPlayerResultBtn" href="/player">
              <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              前往播放
            </a>
            <button class="btn-reset" id="resetBtn">
              <svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.64-11.36L1 10"/></svg>
              继续上传
            </button>
          </div>
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

let currentUser = null;
let isLoginMode = true;

const authPage = $('authPage');
const authTitle = $('authTitle');
const authUsername = $('authUsername');
const authPassword = $('authPassword');
const authSubmit = $('authSubmit');
const authError = $('authError');
const authToggleText = $('authToggleText');
const authToggleLink = $('authToggleLink');
const topBar = $('topBar');
const pageLayout = $('pageLayout');
const sidebarList = $('sidebarList');

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'Z');
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
  if (diff < 604800) return Math.floor(diff / 86400) + ' 天前';
  return d.toLocaleDateString('zh-CN');
}

function showAuthError(msg) {
  authError.textContent = msg;
  authError.classList.add('visible');
}
function hideAuthError() {
  authError.classList.remove('visible');
}

function setAuthMode(login) {
  isLoginMode = login;
  authTitle.textContent = login ? '登录' : '注册';
  authSubmit.textContent = login ? '登录' : '注册';
  authToggleText.textContent = login ? '还没有账号？' : '已有账号？';
  authToggleLink.textContent = login ? '注册' : '登录';
  authPassword.autocomplete = login ? 'current-password' : 'new-password';
  hideAuthError();
}

authToggleLink.addEventListener('click', () => setAuthMode(!isLoginMode));

authSubmit.addEventListener('click', async () => {
  const username = authUsername.value.trim();
  const password = authPassword.value;
  if (!username || !password) { showAuthError('请填写用户名和密码'); return; }
  hideAuthError();
  authSubmit.disabled = true;
  try {
    const url = isLoginMode ? '/api/login' : '/api/register';
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await resp.json();
    if (!resp.ok) { showAuthError(data.error || '操作失败'); return; }
    currentUser = data.username;
    enterLoggedIn(data.username);
  } catch { showAuthError('网络错误'); }
  finally { authSubmit.disabled = false; }
});

authPassword.addEventListener('keydown', e => { if (e.key === 'Enter') authSubmit.click(); });

$('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/logout', { method: 'POST' });
  currentUser = null;
  enterLoggedOut();
});

function enterLoggedIn(username) {
  authPage.classList.remove('visible');
  $('topBarUser').textContent = username;
  topBar.style.display = '';
  pageLayout.classList.add('visible');
  loadPodcastList();
}

function enterLoggedOut() {
  topBar.style.display = 'none';
  pageLayout.classList.remove('visible');
  authUsername.value = '';
  authPassword.value = '';
  hideAuthError();
  setAuthMode(true);
  authPage.classList.add('visible');
}

async function loadPodcastList() {
  try {
    const resp = await fetch('/api/podcasts');
    if (!resp.ok) return;
    const podcasts = await resp.json();
    sidebarList.innerHTML = '';
    if (podcasts.length === 0) {
      sidebarList.innerHTML = '<div class="sidebar-empty">暂无翻译记录</div>';
      return;
    }
    podcasts.forEach(p => {
      const a = document.createElement('a');
      a.className = 'sidebar-item';
      a.href = '/player?id=' + p.id;
      const dateStr = p.last_played_at || p.created_at;
      a.innerHTML = escapeHtml(p.title) + `<span class="sidebar-item-meta">${formatDate(dateStr)}</span>`;
      sidebarList.appendChild(a);
    });
  } catch {}
}

async function initAuth() {
  try {
    const resp = await fetch('/api/me');
    if (resp.ok) {
      const data = await resp.json();
      currentUser = data.username;
      enterLoggedIn(data.username);
    } else { enterLoggedOut(); }
  } catch { enterLoggedOut(); }
}

// ── Upload logic ──
const dropzone = $('dropzone');
const fileInput = $('fileInput');
const fileInfo = $('fileInfo');
const fileName = $('fileName');
const fileSize = $('fileSize');
const fileRemove = $('fileRemove');
const submitBtn = $('submitBtn');
const progressSection = $('progressSection');
const progressStatus = $('progressStatus');
const progressPct = $('progressPct');
const progressBar = $('progressBar');
const processingSection = $('processingSection');
const processingText = $('processingText');
const processingLogs = $('processingLogs');
const resultSection = $('resultSection');
const resetBtn = $('resetBtn');
const errorMsg = $('errorMsg');

let selectedFile = null;
let lastTaskId = null;
const stepMap = { asr: 'step1', translate: 'step2', tts: 'step3' };

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function show(el) { el.classList.add('visible'); }
function hide(el) { el.classList.remove('visible'); el.style.display = ''; }

function selectFile(file) {
  if (!file) return;
  selectedFile = file;
  fileName.textContent = file.name;
  fileSize.textContent = formatSize(file.size);
  show(fileInfo);
  show(submitBtn);
  hideError();
}

function clearFile() {
  selectedFile = null;
  fileInput.value = '';
  hide(fileInfo);
  hide(submitBtn);
}

dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => selectFile(e.target.files[0]));
fileRemove.addEventListener('click', e => { e.stopPropagation(); clearFile(); });

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => { dropzone.classList.remove('drag-over'); });
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('audio/')) selectFile(file);
});

function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.add('visible'); errorMsg.style.display = 'block'; }
function hideError() { errorMsg.classList.remove('visible'); errorMsg.style.display = ''; }

function activateStep(step) { const el = $(stepMap[step]); if (el) { el.classList.remove('done'); el.classList.add('active'); } }
function completeStep(step) { const el = $(stepMap[step]); if (el) { el.classList.remove('active'); el.classList.add('done'); } }
function resetSteps() { [$('step1'), $('step2'), $('step3')].forEach(s => s.classList.remove('active', 'done')); }

function addLog(message) {
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.textContent = message;
  processingLogs.appendChild(entry);
  processingLogs.scrollTop = processingLogs.scrollHeight;
}

function clearLogs() { processingLogs.innerHTML = ''; }

submitBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  hideError();
  dropzone.style.display = 'none';
  hide(fileInfo);
  hide(submitBtn);
  show(progressSection);
  progressSection.style.display = 'block';

  const formData = new FormData();
  formData.append('file', selectedFile);

  try {
    const taskId = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.responseType = 'json';
      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressBar.style.width = pct + '%';
          progressPct.textContent = pct + '%';
          if (pct >= 100) progressStatus.textContent = '上传完成';
        }
      });
      xhr.addEventListener('load', () => {
        if (xhr.status >= 200 && xhr.status < 300) resolve(xhr.response.task_id);
        else reject(new Error(xhr.response?.error || `上传失败 (${xhr.status})`));
      });
      xhr.addEventListener('error', () => reject(new Error('网络连接失败')));
      xhr.addEventListener('abort', () => reject(new Error('上传被取消')));
      xhr.open('POST', '/upload');
      xhr.send(formData);
    });

    lastTaskId = taskId;
    await new Promise(r => setTimeout(r, 400));
    hide(progressSection);
    progressSection.style.display = '';
    show(processingSection);
    processingSection.style.display = 'block';
    processingText.textContent = '正在处理中，请稍候';
    clearLogs();

    await new Promise((resolve, reject) => {
      const evtSource = new EventSource('/progress/' + taskId);
      let settled = false;
      const settle = (fn, val) => { if (settled) return; settled = true; evtSource.close(); fn(val); };
      evtSource.addEventListener('step_start', e => { const { step, message } = JSON.parse(e.data); activateStep(step); if (message) { processingText.textContent = message; addLog(message); } });
      evtSource.addEventListener('step_done', e => { completeStep(JSON.parse(e.data).step); });
      evtSource.addEventListener('log', e => { addLog(JSON.parse(e.data).message); });
      evtSource.addEventListener('done', e => { settle(resolve, JSON.parse(e.data).task_id); });
      evtSource.addEventListener('task_error', e => { settle(reject, new Error(JSON.parse(e.data).message || '处理失败')); });
      evtSource.onerror = () => { settle(reject, new Error('处理过程中连接中断')); };
    });

    hide(processingSection);
    processingSection.style.display = '';
    $('goPlayerResultBtn').href = '/player?id=' + lastTaskId;
    show(resultSection);
    resultSection.style.display = 'block';
    loadPodcastList();

  } catch (err) {
    hide(progressSection); progressSection.style.display = '';
    hide(processingSection); processingSection.style.display = '';
    resetSteps(); resetUI();
    showError(err.message || '处理失败，请重试');
  }
});

function resetUI() {
  progressBar.style.width = '0%';
  progressPct.textContent = '0%';
  progressStatus.textContent = '正在上传';
  dropzone.style.display = '';
  clearFile(); resetSteps(); clearLogs();
}

resetBtn.addEventListener('click', () => {
  hide(resultSection); resultSection.style.display = '';
  resetUI();
});

initAuth();
</script>

</body>
</html>
