<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>播刻 — 播放</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ink: #1a1a1a;
  --paper: #ffffff;
  --paper-deep: #f4f4f4;
  --accent: #c73e1d;
  --accent-soft: rgba(199, 62, 29, 0.08);
  --stone: #666666;
  --stone-light: #999999;
  --border: #e0e0e0;
  --font-mono: 'IBM Plex Mono', 'Menlo', 'Consolas', monospace;
  --font-cn: 'Noto Sans SC', 'PingFang SC', sans-serif;
  --sidebar-w: 220px;

  --speaker-0: rgba(37, 99, 235, 0.07);
  --speaker-0-border: rgba(37, 99, 235, 0.3);
  --speaker-1: rgba(22, 163, 74, 0.07);
  --speaker-1-border: rgba(22, 163, 74, 0.3);
  --speaker-2: rgba(147, 51, 234, 0.07);
  --speaker-2-border: rgba(147, 51, 234, 0.3);
  --speaker-3: rgba(234, 88, 12, 0.07);
  --speaker-3-border: rgba(234, 88, 12, 0.3);
  --speaker-4: rgba(219, 39, 119, 0.07);
  --speaker-4-border: rgba(219, 39, 119, 0.3);
  --speaker-5: rgba(14, 165, 233, 0.07);
  --speaker-5-border: rgba(14, 165, 233, 0.3);

  --speaker-0-tag: #2563eb;
  --speaker-1-tag: #16a34a;
  --speaker-2-tag: #9333ea;
  --speaker-3-tag: #ea580c;
  --speaker-4-tag: #db2777;
  --speaker-5-tag: #0ea5e9;
}

html { font-size: 16px; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-mono);
  height: 100vh;
  overflow: hidden;
}

/* ── Top bar ── */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.8rem 1.5rem;
  border-bottom: 1px solid var(--border);
  height: 45px;
}

.top-bar-brand {
  font-family: var(--font-cn);
  font-weight: 400;
  font-size: 1rem;
  letter-spacing: 0.1em;
  color: var(--ink);
  text-decoration: none;
}

.top-bar-brand:hover { opacity: 0.6; }

.top-bar-right {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.top-bar-user {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--stone);
}

.top-bar-user::before {
  content: '> ';
  color: var(--accent);
}

.top-bar-right a,
.top-bar-right button {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--stone);
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: color 0.15s;
}

.top-bar-right a:hover,
.top-bar-right button:hover { color: var(--accent); }

/* ── Page layout ── */
.page-layout {
  display: flex;
  height: calc(100vh - 45px);
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-title {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--stone);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 1rem 1rem 0.5rem;
  flex-shrink: 0;
}

.sidebar-list {
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex: 1;
}

.sidebar-list::-webkit-scrollbar { width: 2px; }
.sidebar-list::-webkit-scrollbar-track { background: transparent; }
.sidebar-list::-webkit-scrollbar-thumb { background: var(--border); }

.sidebar-item {
  display: block;
  padding: 0.5rem 1rem;
  font-family: var(--font-cn);
  font-weight: 400;
  font-size: 0.82rem;
  color: var(--ink);
  cursor: pointer;
  transition: background 0.1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  border-left: 2px solid transparent;
}

.sidebar-item:hover {
  background: var(--paper-deep);
}

.sidebar-item.active {
  background: var(--accent-soft);
  border-left-color: var(--accent);
}

.sidebar-item-meta {
  display: block;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--stone-light);
  margin-top: 0.1rem;
}

.sidebar-empty {
  padding: 0.8rem 1rem;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--stone-light);
}

.sidebar-upload {
  display: block;
  margin: 0.5rem 0.8rem 0.8rem;
  padding: 0.45rem 0.6rem;
  border: 1px dashed var(--border);
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--stone);
  text-decoration: none;
  text-align: center;
  transition: all 0.15s;
  flex-shrink: 0;
}

.sidebar-upload:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ── Main player area ── */
.player-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Empty state ── */
.empty-state {
  display: none;
  flex: 1;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.empty-state.visible { display: flex; }

.empty-text {
  font-family: var(--font-mono);
  font-size: 0.88rem;
  color: var(--stone);
  line-height: 1.8;
}

.empty-text a {
  color: var(--accent);
  text-decoration: none;
}

.empty-text a:hover { text-decoration: underline; }

/* ── Now playing ── */
.now-playing {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

.now-playing.visible { display: flex; }

/* Player header */
.player-header {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.podcast-title {
  font-family: var(--font-cn);
  font-weight: 500;
  font-size: 1.05rem;
  color: var(--ink);
  line-height: 1.4;
  margin-bottom: 0.8rem;
}

audio { display: none; }

/* Custom player */
.custom-player {
  margin-top: 0.5rem;
}

.player-progress-wrap {
  position: relative;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  cursor: pointer;
  transition: height 0.1s;
}

.player-progress-wrap:hover {
  height: 6px;
}

.player-progress-buffered {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: rgba(0, 0, 0, 0.06);
  border-radius: 2px;
  width: 0%;
  pointer-events: none;
}

.player-progress-filled {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  pointer-events: none;
}

.player-progress-handle {
  position: absolute;
  top: 50%;
  left: 0%;
  width: 12px;
  height: 12px;
  background: var(--accent);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity 0.15s;
  pointer-events: none;
}

.player-progress-wrap:hover .player-progress-handle,
.player-progress-wrap.dragging .player-progress-handle {
  opacity: 1;
}

.player-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 0.5rem;
}

.player-time {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--stone);
  min-width: 36px;
  user-select: none;
}

.player-time:last-child {
  text-align: right;
}

.player-btns {
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.btn-play {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--ink);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--paper);
  transition: all 0.15s;
}

.btn-play:hover {
  background: var(--accent);
}

.btn-play svg {
  width: 18px;
  height: 18px;
  fill: currentColor;
}

.btn-skip {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--stone);
  transition: all 0.15s;
}

.btn-skip:hover {
  color: var(--ink);
  background: var(--paper-deep);
}

.btn-skip svg {
  width: 28px;
  height: 28px;
}

.player-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 0.6rem;
}

.btn-action {
  padding: 0.35rem 0.6rem;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--stone);
}

.btn-action:hover {
  background: var(--paper-deep);
  color: var(--ink);
}

.btn-action svg {
  width: 12px;
  height: 12px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
}

.btn-en-toggle {
  padding: 0.25rem 0.55rem;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--stone);
}

.btn-en-toggle.active {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--paper);
}

/* ── Subtitle area ── */
.subtitle-area {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.subtitle-area::before,
.subtitle-area::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  height: 20px;
  pointer-events: none;
  z-index: 2;
}

.subtitle-area::before {
  top: 0;
  background: linear-gradient(to bottom, var(--paper), transparent);
}

.subtitle-area::after {
  bottom: 0;
  background: linear-gradient(to top, var(--paper), transparent);
}

.subtitle-container {
  height: 100%;
  overflow-y: auto;
  padding: 0.8rem 1.5rem;
}

.subtitle-container::-webkit-scrollbar { width: 2px; }
.subtitle-container::-webkit-scrollbar-track { background: transparent; }
.subtitle-container::-webkit-scrollbar-thumb { background: var(--border); }

.subtitle-entry {
  padding: 0.5rem 0.7rem;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  opacity: 0.3;
  border-left: 2px solid transparent;
  margin-bottom: 2px;
}

.subtitle-entry:hover { opacity: 0.6; }
.subtitle-entry.active { opacity: 1; }
.subtitle-entry.past { opacity: 0.5; }

/* Speaker colors */
.subtitle-entry[data-speaker="0"] { background: var(--speaker-0); }
.subtitle-entry[data-speaker="0"].active { border-left-color: var(--speaker-0-border); }
.subtitle-entry[data-speaker="1"] { background: var(--speaker-1); }
.subtitle-entry[data-speaker="1"].active { border-left-color: var(--speaker-1-border); }
.subtitle-entry[data-speaker="2"] { background: var(--speaker-2); }
.subtitle-entry[data-speaker="2"].active { border-left-color: var(--speaker-2-border); }
.subtitle-entry[data-speaker="3"] { background: var(--speaker-3); }
.subtitle-entry[data-speaker="3"].active { border-left-color: var(--speaker-3-border); }
.subtitle-entry[data-speaker="4"] { background: var(--speaker-4); }
.subtitle-entry[data-speaker="4"].active { border-left-color: var(--speaker-4-border); }
.subtitle-entry[data-speaker="5"] { background: var(--speaker-5); }
.subtitle-entry[data-speaker="5"].active { border-left-color: var(--speaker-5-border); }

.subtitle-speaker {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 500;
  opacity: 0.8;
  margin-bottom: 0.1rem;
  letter-spacing: 0.04em;
}

.subtitle-entry[data-speaker="0"] .subtitle-speaker { color: var(--speaker-0-tag); }
.subtitle-entry[data-speaker="1"] .subtitle-speaker { color: var(--speaker-1-tag); }
.subtitle-entry[data-speaker="2"] .subtitle-speaker { color: var(--speaker-2-tag); }
.subtitle-entry[data-speaker="3"] .subtitle-speaker { color: var(--speaker-3-tag); }
.subtitle-entry[data-speaker="4"] .subtitle-speaker { color: var(--speaker-4-tag); }
.subtitle-entry[data-speaker="5"] .subtitle-speaker { color: var(--speaker-5-tag); }

.subtitle-chinese {
  font-family: var(--font-cn);
  font-weight: 400;
  font-size: 0.9rem;
  color: var(--ink);
  line-height: 1.7;
}

.subtitle-english {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--stone);
  line-height: 1.5;
  margin-top: 0.15rem;
}

.subtitle-container.hide-english .subtitle-english {
  display: none;
}

@media (max-width: 700px) {
  .page-layout { flex-direction: column; }
  .sidebar {
    width: 100%;
    height: auto;
    max-height: 140px;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-list { flex-direction: row; overflow-x: auto; overflow-y: hidden; }
  .sidebar-item { white-space: nowrap; flex-shrink: 0; border-left: none; border-bottom: 2px solid transparent; }
  .sidebar-item.active { border-left-color: transparent; border-bottom-color: var(--accent); }
  .sidebar-upload { display: none; }
  .player-main { height: 0; flex: 1; }
  .subtitle-container { padding: 0.8rem 1rem; }
  .player-header { padding: 0.8rem 1rem; }
  .player-progress-handle { opacity: 1; }
  .btn-play { width: 44px; height: 44px; }
  .btn-play svg { width: 20px; height: 20px; }
  .btn-skip { width: 40px; height: 40px; }
  .btn-skip svg { width: 32px; height: 32px; }
}
</style>
</head>
<body>

<nav class="top-bar">
  <a href="/" class="top-bar-brand">播刻</a>
  <div class="top-bar-right">
    <span class="top-bar-user" id="topBarUser"></span>
    <a href="/">上传新播客</a>
    <button id="logoutBtn">退出</button>
  </div>
</nav>

<div class="page-layout">
  <aside class="sidebar">
    <div class="sidebar-title">播放列表</div>
    <div class="sidebar-list" id="sidebarList">
      <div class="sidebar-empty">暂无记录</div>
    </div>
    <a href="/" class="sidebar-upload">+ 上传新播客</a>
  </aside>

  <main class="player-main">
    <div class="empty-state" id="emptyState">
      <div class="empty-text">
        还没有播客记录<br>
        <a href="/">上传一个播客开始收听</a>
      </div>
    </div>

    <div class="now-playing" id="nowPlaying">
      <div class="player-header">
        <h2 class="podcast-title" id="podcastTitle"></h2>
        <audio id="audioPlayer"></audio>
        <div class="custom-player">
          <div class="player-progress-wrap" id="playerProgressWrap">
            <div class="player-progress-buffered" id="progressBuffered"></div>
            <div class="player-progress-filled" id="progressFilled"></div>
            <div class="player-progress-handle" id="progressHandle"></div>
          </div>
          <div class="player-row">
            <span class="player-time" id="playerCurrentTime">0:00</span>
            <div class="player-btns">
              <button class="btn-skip" id="btnRewind" title="后退15秒">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
                  <text x="12" y="15.5" text-anchor="middle" font-size="7.5" fill="currentColor" stroke="none" font-weight="700" font-family="sans-serif">15</text>
                </svg>
              </button>
              <button class="btn-play" id="btnPlay" title="播放">
                <svg class="icon-play" viewBox="0 0 24 24"><polygon points="7,4 20,12 7,20"/></svg>
                <svg class="icon-pause" viewBox="0 0 24 24" style="display:none"><rect x="5" y="4" width="5" height="16" rx="1"/><rect x="14" y="4" width="5" height="16" rx="1"/></svg>
              </button>
              <button class="btn-skip" id="btnForward" title="前进15秒">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
                  <text x="12" y="15.5" text-anchor="middle" font-size="7.5" fill="currentColor" stroke="none" font-weight="700" font-family="sans-serif">15</text>
                </svg>
              </button>
            </div>
            <span class="player-time" id="playerDuration">0:00</span>
          </div>
        </div>
        <div class="player-controls">
          <a class="btn-action" id="downloadBtn" download="podcast_chinese.mp3">
            <svg viewBox="0 0 24 24"><path d="M12 4v12m0 0l-4-4m4 4l4-4"/><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
            下载
          </a>
          <button class="btn-en-toggle active" id="enToggleBtn">EN</button>
        </div>
      </div>

      <div class="subtitle-area">
        <div class="subtitle-container" id="subtitleContainer"></div>
      </div>
    </div>
  </main>
</div>

<script>
const $ = id => document.getElementById(id);

const audioPlayer = $('audioPlayer');
const subtitleContainer = $('subtitleContainer');
const enToggleBtn = $('enToggleBtn');
const podcastTitle = $('podcastTitle');
const downloadBtn = $('downloadBtn');
const nowPlaying = $('nowPlaying');
const emptyState = $('emptyState');
const sidebarList = $('sidebarList');

let subtitleData = null;
let currentSubIdx = -1;
let showEnglish = true;
let currentPodcastId = null;
let saveTimer = null;

const speakerIndexMap = new Map();
let nextSpeakerIndex = 0;

function getSpeakerIndex(speaker) {
  if (!speakerIndexMap.has(speaker)) {
    speakerIndexMap.set(speaker, nextSpeakerIndex % 6);
    nextSpeakerIndex++;
  }
  return speakerIndexMap.get(speaker);
}

async function checkAuth() {
  try {
    const resp = await fetch('/api/me');
    if (!resp.ok) { window.location.href = '/'; return null; }
    const data = await resp.json();
    $('topBarUser').textContent = data.username;
    return data;
  } catch { window.location.href = '/'; return null; }
}

$('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/';
});

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function renderSubtitles() {
  subtitleContainer.innerHTML = '';
  speakerIndexMap.clear();
  nextSpeakerIndex = 0;
  if (!subtitleData || !subtitleData.subtitles || !subtitleData.subtitles.length) return;

  subtitleData.subtitles.forEach((sub, i) => {
    const el = document.createElement('div');
    el.className = 'subtitle-entry';
    el.dataset.index = i;
    if (sub.speaker) el.dataset.speaker = getSpeakerIndex(sub.speaker);

    let html = '';
    if (sub.speaker) html += `<div class="subtitle-speaker">Speaker ${sub.speaker}</div>`;
    html += `<div class="subtitle-chinese">${escapeHtml(sub.chinese)}</div>`;
    if (sub.english) html += `<div class="subtitle-english">${escapeHtml(sub.english)}</div>`;
    el.innerHTML = html;

    el.addEventListener('click', () => {
      audioPlayer.currentTime = sub.start;
      audioPlayer.play();
    });
    subtitleContainer.appendChild(el);
  });
  currentSubIdx = -1;
}

function syncSubtitle() {
  if (!subtitleData || !subtitleData.subtitles || !subtitleData.subtitles.length) return;
  const t = audioPlayer.currentTime;
  const subs = subtitleData.subtitles;
  let lo = 0, hi = subs.length - 1, idx = -1;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (t < subs[mid].start) hi = mid - 1;
    else if (t >= subs[mid].end) lo = mid + 1;
    else { idx = mid; break; }
  }
  if (idx === currentSubIdx) return;
  currentSubIdx = idx;
  const entries = subtitleContainer.querySelectorAll('.subtitle-entry');
  entries.forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    el.classList.toggle('past', idx >= 0 && i < idx);
  });
  if (idx >= 0 && entries[idx]) {
    const entry = entries[idx];
    const cr = subtitleContainer.getBoundingClientRect();
    const er = entry.getBoundingClientRect();
    subtitleContainer.scrollBy({ top: er.top - cr.top - cr.height / 2 + er.height / 2, behavior: 'smooth' });
  }
}

audioPlayer.addEventListener('timeupdate', syncSubtitle);

enToggleBtn.addEventListener('click', () => {
  showEnglish = !showEnglish;
  enToggleBtn.classList.toggle('active', showEnglish);
  subtitleContainer.classList.toggle('hide-english', !showEnglish);
});

// Custom player controls
const btnPlay = $('btnPlay');
const btnRewind = $('btnRewind');
const btnForward = $('btnForward');
const progressWrap = $('playerProgressWrap');
const progressFilled = $('progressFilled');
const progressBuffered = $('progressBuffered');
const progressHandle = $('progressHandle');
const playerCurrentTime = $('playerCurrentTime');
const playerDuration = $('playerDuration');

function formatTime(s) {
  if (isNaN(s) || s < 0) return '0:00';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  if (h > 0) return h + ':' + (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

btnPlay.addEventListener('click', () => {
  if (audioPlayer.paused) audioPlayer.play();
  else audioPlayer.pause();
});

function updatePlayIcon() {
  btnPlay.querySelector('.icon-play').style.display = audioPlayer.paused ? '' : 'none';
  btnPlay.querySelector('.icon-pause').style.display = audioPlayer.paused ? 'none' : '';
}
audioPlayer.addEventListener('play', updatePlayIcon);
audioPlayer.addEventListener('pause', updatePlayIcon);

btnRewind.addEventListener('click', () => {
  audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - 15);
});
btnForward.addEventListener('click', () => {
  audioPlayer.currentTime = Math.min(audioPlayer.duration || 0, audioPlayer.currentTime + 15);
});

function updateProgress() {
  if (!audioPlayer.duration) return;
  const pct = (audioPlayer.currentTime / audioPlayer.duration) * 100;
  progressFilled.style.width = pct + '%';
  progressHandle.style.left = pct + '%';
  playerCurrentTime.textContent = formatTime(audioPlayer.currentTime);
  playerDuration.textContent = formatTime(audioPlayer.duration);
}
audioPlayer.addEventListener('timeupdate', updateProgress);
audioPlayer.addEventListener('loadedmetadata', updateProgress);
audioPlayer.addEventListener('durationchange', () => {
  playerDuration.textContent = formatTime(audioPlayer.duration);
});

audioPlayer.addEventListener('progress', () => {
  if (audioPlayer.buffered.length > 0 && audioPlayer.duration) {
    const end = audioPlayer.buffered.end(audioPlayer.buffered.length - 1);
    progressBuffered.style.width = (end / audioPlayer.duration) * 100 + '%';
  }
});

function seekFromEvent(e) {
  const rect = progressWrap.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audioPlayer.currentTime = pct * (audioPlayer.duration || 0);
  updateProgress();
}

let progressDragging = false;
progressWrap.addEventListener('mousedown', (e) => {
  progressDragging = true;
  progressWrap.classList.add('dragging');
  seekFromEvent(e);
});
document.addEventListener('mousemove', (e) => { if (progressDragging) seekFromEvent(e); });
document.addEventListener('mouseup', () => {
  if (progressDragging) { progressDragging = false; progressWrap.classList.remove('dragging'); }
});
progressWrap.addEventListener('touchstart', (e) => {
  progressDragging = true;
  progressWrap.classList.add('dragging');
  seekFromEvent(e.touches[0]);
}, { passive: true });
document.addEventListener('touchmove', (e) => { if (progressDragging) seekFromEvent(e.touches[0]); }, { passive: true });
document.addEventListener('touchend', () => {
  if (progressDragging) { progressDragging = false; progressWrap.classList.remove('dragging'); }
});

// Progress saving
let switchingPodcast = false;

function saveProgress() {
  if (currentPodcastId && audioPlayer.currentTime > 0) {
    fetch(`/api/progress/${currentPodcastId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ position: audioPlayer.currentTime }),
    }).catch(() => {});
  }
}

function startSavingProgress() { stopSavingProgress(); saveTimer = setInterval(saveProgress, 5000); }
function stopSavingProgress() { if (saveTimer) { clearInterval(saveTimer); saveTimer = null; } }

audioPlayer.addEventListener('pause', () => { if (!switchingPodcast) saveProgress(); });
audioPlayer.addEventListener('seeked', saveProgress);
window.addEventListener('beforeunload', () => {
  if (currentPodcastId && audioPlayer.currentTime > 0) {
    navigator.sendBeacon(`/api/progress/${currentPodcastId}`,
      new Blob([JSON.stringify({ position: audioPlayer.currentTime })], { type: 'application/json' }));
  }
});
audioPlayer.addEventListener('play', startSavingProgress);
audioPlayer.addEventListener('pause', () => { if (!switchingPodcast) stopSavingProgress(); });
audioPlayer.addEventListener('ended', stopSavingProgress);

async function loadPodcast(podcastId, resumePosition) {
  // If already playing this podcast, do nothing
  if (currentPodcastId === podcastId && audioPlayer.src) return;

  // Save progress for the old podcast before switching
  if (currentPodcastId && currentPodcastId !== podcastId && audioPlayer.currentTime > 0) {
    saveProgress();
  }
  stopSavingProgress();

  switchingPodcast = true;
  currentPodcastId = podcastId;
  subtitleData = null;
  currentSubIdx = -1;
  subtitleContainer.innerHTML = '';

  audioPlayer.src = `/podcast/${podcastId}/audio`;
  switchingPodcast = false;
  downloadBtn.href = `/podcast/${podcastId}/audio`;

  try {
    const resp = await fetch(`/podcast/${podcastId}/subtitles`);
    if (resp.ok) { subtitleData = await resp.json(); renderSubtitles(); }
  } catch {}

  if (resumePosition === undefined) {
    try {
      const resp = await fetch(`/api/progress/${podcastId}`);
      if (resp.ok) { const data = await resp.json(); resumePosition = data.position || 0; }
    } catch {}
  }

  if (resumePosition > 0) {
    if (audioPlayer.readyState >= 1) {
      audioPlayer.currentTime = resumePosition;
    } else {
      audioPlayer.addEventListener('loadedmetadata', function onMeta() {
        audioPlayer.removeEventListener('loadedmetadata', onMeta);
        audioPlayer.currentTime = resumePosition;
      });
    }
  }

  // Update sidebar active
  sidebarList.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === podcastId);
  });

  emptyState.classList.remove('visible');
  nowPlaying.classList.add('visible');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'Z');
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
  if (diff < 604800) return Math.floor(diff / 86400) + ' 天前';
  return d.toLocaleDateString('zh-CN');
}

async function loadSidebar() {
  try {
    const resp = await fetch('/api/podcasts');
    if (!resp.ok) return [];
    const podcasts = await resp.json();

    sidebarList.innerHTML = '';
    if (podcasts.length === 0) {
      sidebarList.innerHTML = '<div class="sidebar-empty">暂无记录</div>';
      return podcasts;
    }

    podcasts.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'sidebar-item';
      btn.dataset.id = p.id;
      if (p.id === currentPodcastId) btn.classList.add('active');

      const dateStr = p.last_played_at || p.created_at;
      btn.innerHTML = escapeHtml(p.title) + `<span class="sidebar-item-meta">${formatDate(dateStr)}</span>`;

      btn.addEventListener('click', () => {
        podcastTitle.textContent = p.title;
        loadPodcast(p.id);
        sidebarList.querySelectorAll('.sidebar-item').forEach(el => {
          el.classList.toggle('active', el.dataset.id === p.id);
        });
      });

      sidebarList.appendChild(btn);
    });

    return podcasts;
  } catch { return []; }
}

async function init() {
  const userData = await checkAuth();
  if (!userData) return;

  const podcasts = await loadSidebar();
  const params = new URLSearchParams(window.location.search);
  const requestedId = params.get('id');

  if (requestedId) {
    const podcast = podcasts.find(p => p.id === requestedId);
    podcastTitle.textContent = podcast ? podcast.title : '播客';
    await loadPodcast(requestedId);
  } else if (userData.last_played) {
    podcastTitle.textContent = userData.last_played.title;
    await loadPodcast(userData.last_played.podcast_id, userData.last_played.position);
  } else if (podcasts.length > 0) {
    podcastTitle.textContent = podcasts[0].title;
    await loadPodcast(podcasts[0].id);
  } else {
    emptyState.classList.add('visible');
  }
}

init();
</script>
